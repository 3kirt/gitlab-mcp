name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy, rustfmt

      - uses: Swatinem/rust-cache@v2

      - run: cargo clippy --locked -- -D warnings

      - run: cargo fmt --check

      # The Claude Code plugin's bootstrap downloads the release binary
      # matching plugin.json's version; a version that lags the tag would
      # silently serve plugin users the previous release's binary.
      - name: Check versions match the tag
        run: |
          tag="${GITHUB_REF_NAME#v}"
          cargo_version="$(sed -n 's/^version = "\(.*\)"/\1/p' Cargo.toml | head -n 1)"
          plugin_version="$(jq -r .version plugin/.claude-plugin/plugin.json)"
          echo "tag=$tag cargo=$cargo_version plugin=$plugin_version"
          test "$cargo_version" = "$tag" || { echo "Cargo.toml version does not match tag"; exit 1; }
          test "$plugin_version" = "$tag" || { echo "plugin.json version does not match tag"; exit 1; }

  build:
    name: Build ${{ matrix.artifact }}
    runs-on: ${{ matrix.os }}
    needs: lint
    strategy:
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            artifact: gitlab-mcp-linux-amd64
          - os: ubuntu-latest
            target: aarch64-unknown-linux-gnu
            artifact: gitlab-mcp-linux-arm64
            linker: gcc-aarch64-linux-gnu
          - os: macos-latest
            target: aarch64-apple-darwin
            artifact: gitlab-mcp-darwin-arm64
          - os: macos-latest
            target: x86_64-apple-darwin
            artifact: gitlab-mcp-darwin-amd64
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - uses: Swatinem/rust-cache@v2

      - name: Install cross-linker (Linux arm64)
        if: matrix.linker != ''
        run: sudo apt-get install -y ${{ matrix.linker }}

      - name: Build
        run: cargo build --release --locked --target ${{ matrix.target }}
        env:
          CARGO_TARGET_AARCH64_UNKNOWN_LINUX_GNU_LINKER: aarch64-linux-gnu-gcc

      - name: Stage binary
        run: cp target/${{ matrix.target }}/release/gitlab-mcp ${{ matrix.artifact }}

      - uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: ${{ matrix.artifact }}

  release:
    name: GitHub Release
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true

      - name: Checksums
        run: cd artifacts && sha256sum * > checksums.txt

      - uses: softprops/action-gh-release@v2
        with:
          files: artifacts/*
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
