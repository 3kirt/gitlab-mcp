name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  CARGO_TERM_COLOR: always

jobs:
  test:
    name: Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable

      - uses: Swatinem/rust-cache@v2

      - run: cargo test --all --locked

  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy, rustfmt

      - uses: Swatinem/rust-cache@v2

      - run: cargo clippy --locked -- -D warnings

      - run: cargo fmt --check

      # .mcp.json is tracked (with ${VAR} placeholders); make sure no real
      # GitLab token ever lands in the repo. Docs use the all-x placeholder
      # glpat-xxxxxxxxxxxxxxxxxxxx, which no real (random) token resembles.
      - name: Scan for committed GitLab tokens
        run: |
          if git grep -nE 'glpat-[A-Za-z0-9_-]{10,}' -- . | grep -vE 'glpat-x{10,}'; then
            echo "A GitLab personal access token appears to be committed"; exit 1
          fi
